<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Para Tu TractoCamión</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="TodoParaTuTractoCamion.BlazorWasm.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:'Inter',sans-serif; background:#000; color:#fff;">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem; color: #FF6B00 !important;">
                <span class="visually-hidden">Cargando...</span>
            </div>
            <div style="margin-top: 20px; font-weight: 700; letter-spacing: 1px; color: #FF6B00;">CARGANDO PRODUCTOS...</div>
        </div>
    </div>

    <div id="blazor-error-ui" style="background: #111; color: #fff; border-top: 2px solid #FF6B00;">
        <span style="color: #FF6B00; font-weight: bold;">CARGANDO PRODUCTOS...</span>
        <a href="." class="reload" style="color: #fff; text-decoration: underline; margin-left: 10px;">Reintentar</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
